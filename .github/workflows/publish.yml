name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/dependabot.yml'
  workflow_dispatch:

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed to read commits since last tag

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install npm with OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: node --test build/tests/heuristics.test.js

      - name: Integration tests
        run: npx tsx --test tests/operator.inline-env.integration.test.ts

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Determine next version
        id: version
        run: |
          # Get current version from last tag, default to 0.0.0
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LAST_TAG#v}"
          fi

          # Parse semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Determine bump type from commit messages since last tag
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "Releasing $NEW_VERSION"

      - name: Create tag and GitHub Release
        run: gh release create "$VERSION" --generate-notes --title "$VERSION" --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to npm
        run: |
          npm pkg set version="${NPM_VERSION}"
          npm publish --access public --provenance
        env:
          NPM_VERSION: ${{ steps.version.outputs.npm_version }}
