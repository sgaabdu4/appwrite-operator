name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/dependabot.yml'

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip version-bump commits to avoid infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed to read commits since last tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: node --test build/tests/heuristics.test.js

      - name: Integration tests
        run: npx tsx --test tests/operator.inline-env.integration.test.ts

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        id: version
        run: |
          # Determine bump type from commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            BUMP="patch"
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          NEW_VERSION=$(npm version "$BUMP" -m "chore(release): v%s [skip ci]")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: git push && git push --tags

      - name: Create GitHub Release with changelog
        run: gh release create "$VERSION" --generate-notes --title "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
